<!DOCTYPE html>
<html>
<head>
  <title>Link Harbor</title>
  <style>
    body {
      width: 300px;
      padding: 10px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    .logo {
      width: 24px;
      height: 24px;
      margin-right: 8px;
    }
    h1 {
      font-size: 16px;
      margin: 0;
    }
    input, textarea, select {
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    textarea {
      min-height: 60px;
      resize: vertical;
    }
    .button {
      background-color: #3B82F6;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }
    .button:hover {
      background-color: #2563EB;
    }
    .button:disabled {
      background-color: #9CA3AF;
      cursor: not-allowed;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
    }
    .success {
      background-color: #D1FAE5;
      color: #065F46;
    }
    .error {
      background-color: #FEE2E2;
      color: #B91C1C;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon48.png" alt="Link Harbor" class="logo">
      <h1>Save to Link Harbor</h1>
    </div>
    
    <div id="form-container">
      <input type="text" id="name" placeholder="Link name">
      <textarea id="description" placeholder="Description (optional)"></textarea>
      <select id="category">
        <option value="">Select a category</option>
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
        <option value="Education">Education</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Tools">Tools</option>
        <option value="Other">Other</option>
      </select>
      <button id="save" class="button">Save Link</button>
    </div>
    
    <div id="status" class="status" style="display: none;"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
